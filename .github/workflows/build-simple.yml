name: Build APK Simple

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        ls -la
        echo "=== Starting Build ==="
        gradle assembleDebug 2>&1 || echo "BUILD EXIT CODE: $?"
      shell: bash
    
    - name: Check APK exists
      run: |
        find . -name "*.apk" -type f 2>/dev/null | head -5
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK directory not found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MyModifier-APK
        path: app/build/outputs/apk/debug/*.apk
