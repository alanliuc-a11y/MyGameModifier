name: Build and Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5
    
    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        gradle assembleDebug --stacktrace
      shell: bash
    
    - name: Check APK exists
      run: |
        ls -la app/build/outputs/apk/debug/
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MyGameModifier.apk
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyModifier-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## My Game Modifier v${{ github.run_number }}
          
          ### 下载
          - 📱 APK文件已上传到Release Assets
          
          ### 安装
          1. 下载 `MyGameModifier.apk`
          2. 在Android设备上安装
          3. 授予必要权限
          
          ### 功能
          - 内存搜索
          - 数值修改
          - 悬浮窗操作
          
          ### 系统要求
          - Android 5.0+
          - 需要Root或虚拟机
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/debug/MyGameModifier.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
